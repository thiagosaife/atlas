name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # lets you re-deploy without a commit
  workflow_dispatch:

# Allow the workflow to publish to Pages, one deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Validates the empire catalogue and typechecks before anything ships:
      # a bad country name would otherwise fail silently as an empire that
      # simply never paints.
      - name: Build
        run: npm run build
        env:
          # Pages serves the site from /<repo>/, not the domain root.
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
