<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:14px 16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .sw { flex:1; min-width:52px; }
  .chip { height:52px; border:1px solid var(--line-1); }
  .lbl { font-family: monospace; font-size:9.5px; line-height:1.35; color: var(--ink-soft); margin-top:4px; }

</style></head><body>
<div class="row"><div class="sw"><div class="chip" style="background:var(--sea)"></div><div class="lbl">--sea<br>#a9b89b</div></div><div class="sw"><div class="chip" style="background:var(--land)"></div><div class="lbl">--land<br>#cdb082</div></div><div class="sw"><div class="chip" style="background:var(--land-empire)"></div><div class="lbl">--land-empire<br>#c69a5a</div></div><div class="sw"><div class="chip" style="background:var(--land-hover)"></div><div class="lbl">--land-hover<br>#e0b64d</div></div></div></body></html>
