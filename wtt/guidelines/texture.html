<!-- @dsCard group="Effects" viewport="700x210" name="Page texture" subtitle="Radial parchment glow · vignette · film grain" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:14px 16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .sw { flex:1; min-width:52px; }
  .chip { height:52px; border:1px solid var(--line-1); }
  .lbl { font-family: monospace; font-size:9.5px; line-height:1.35; color: var(--ink-soft); margin-top:4px; }
  .stage { position:relative; height:150px; background: var(--surface-page); overflow:hidden; }
  .stage::before { content:""; position:absolute; inset:0; pointer-events:none; box-shadow: var(--vignette); }
  .grain { position:absolute; inset:0; opacity:0.10; mix-blend-mode:multiply; width:100%; height:100%; }
</style></head><body>
<div class="stage">
  <img class="grain" src="../assets/textures/grain.svg" alt="">
  <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; letter-spacing:0.2em; font-size:0.85rem">UNROLLING THE MAP…</div>
</div>
<div class="lbl" style="margin-top:6px">--surface-page + --vignette (::before) + grain.svg at opacity .10, multiply</div></body></html>
