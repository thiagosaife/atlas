<!-- @dsCard group="Colors" viewport="700x140" name="Paper ramp" subtitle="Parchment surfaces, lightest to darkest" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:14px 16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .sw { flex:1; min-width:52px; }
  .chip { height:52px; border:1px solid var(--line-1); }
  .lbl { font-family: monospace; font-size:9.5px; line-height:1.35; color: var(--ink-soft); margin-top:4px; }

</style></head><body>
<div class="row"><div class="sw"><div class="chip" style="background:var(--paper-0)"></div><div class="lbl">--paper-0<br>#f4e7c8</div></div><div class="sw"><div class="chip" style="background:var(--paper-1)"></div><div class="lbl">--paper-1<br>#f2e3c0</div></div><div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="lbl">--paper-2<br>#efe0bc</div></div><div class="sw"><div class="chip" style="background:var(--paper-3)"></div><div class="lbl">--paper-3<br>#e6d2a6</div></div><div class="sw"><div class="chip" style="background:var(--paper-4)"></div><div class="lbl">--paper-4<br>#e2cd9f</div></div><div class="sw"><div class="chip" style="background:var(--paper-5)"></div><div class="lbl">--paper-5<br>#d9c29a</div></div><div class="sw"><div class="chip" style="background:var(--paper-6)"></div><div class="lbl">--paper-6<br>#cdb082</div></div><div class="sw"><div class="chip" style="background:var(--paper-7)"></div><div class="lbl">--paper-7<br>#b89a68</div></div><div class="sw"><div class="chip" style="background:var(--paper-8)"></div><div class="lbl">--paper-8<br>#93764a</div></div></div></body></html>
