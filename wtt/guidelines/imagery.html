<!-- @dsCard group="Effects" viewport="700x230" name="Imagery" subtitle="Sepia field photographs in tilted paper mats" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:14px 16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .sw { flex:1; min-width:52px; }
  .chip { height:52px; border:1px solid var(--line-1); }
  .lbl { font-family: monospace; font-size:9.5px; line-height:1.35; color: var(--ink-soft); margin-top:4px; }

</style></head><body>
<div class="row" style="padding:6px 8px">
<figure style="margin:0; padding:5px 5px 6px; background:var(--paper-2); border:var(--border-frame); box-shadow:var(--shadow-input); transform:var(--tilt-frame); width:200px">
  <div style="height:120px; display:flex; align-items:center; justify-content:center; border:var(--border-card); color:var(--ink-soft); background:repeating-linear-gradient(45deg,#cbb489 0 8px,#c2aa7e 8px 16px); font-family:monospace; font-size:10px">field photograph</div>
</figure>
<div style="flex:1; min-width:220px; font-size:0.8rem; line-height:1.5; color:var(--ink-soft); font-style:italic">Every image passes through<br><span style="font-family:monospace; font-style:normal; font-size:10px">--filter-sepia: sepia(.35) saturate(.85) contrast(.97)</span><br>inside a white-matted frame tilted --tilt-frame (−0.5°). Never a bare, unfiltered image.</div>
</div></body></html>
