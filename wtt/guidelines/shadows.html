<!-- @dsCard group="Effects" viewport="700x190" name="Shadows" subtitle="Warm umber, directional — never grey" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:14px 16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .sw { flex:1; min-width:52px; }
  .chip { height:52px; border:1px solid var(--line-1); }
  .lbl { font-family: monospace; font-size:9.5px; line-height:1.35; color: var(--ink-soft); margin-top:4px; }

</style></head><body>
<div class="row" style="padding:8px 4px 18px"><div style="flex:1; min-width:100px; background:var(--surface-note); border:var(--border-card); box-shadow:var(--shadow-chip); padding:12px 10px; font-size:0.72rem">chip<br><span class="lbl">1px 2px 4px rgba(30,16,6,…)</span></div><div style="flex:1; min-width:100px; background:var(--surface-note); border:var(--border-card); box-shadow:var(--shadow-input); padding:12px 10px; font-size:0.72rem">input<br><span class="lbl">2px 3px 8px rgba(30,16,6,…)</span></div><div style="flex:1; min-width:100px; background:var(--surface-note); border:var(--border-card); box-shadow:var(--shadow-float); padding:12px 10px; font-size:0.72rem">float<br><span class="lbl">2px 4px 12px rgba(30,16,6,…)</span></div><div style="flex:1; min-width:100px; background:var(--surface-note); border:var(--border-card); box-shadow:var(--shadow-note); padding:12px 10px; font-size:0.72rem">note<br><span class="lbl">3px 6px 14px rgba(30,16,6,…)</span></div><div style="flex:1; min-width:100px; background:var(--surface-note); border:var(--border-card); box-shadow:var(--shadow-drawer); padding:12px 10px; font-size:0.72rem">drawer<br><span class="lbl">-8px 0 24px rgba(30,16,6,…)</span></div></div></body></html>
