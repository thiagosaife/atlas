<!-- @dsCard group="Atlas App" viewport="1440x900" name="Atlas of Long Gone Empires" subtitle="Full working app — ground truth" -->
<!-- @startingPoint section="Atlas App" subtitle="The full expedition-map app" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas of Long Gone Empires</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --parchment: #d9c29a;
    --ink: #40260f;
    --ink-soft: #5c3a1e;
    --sea: #a9b89b;
    --land: #cdb082;
    --land-hover: #e0b64d;
    --land-empire: #c69a5a;
    --gold: #b8862f;
    --crimson: #8a2f22;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: #1c140b;
    font-family: "IM Fell English", Georgia, serif;
    color: var(--ink);
    overflow: hidden;
  }

  #stage {
    position: relative; width: 100%; height: 100vh;
    background: radial-gradient(ellipse at 50% 40%, #e7d3ab 0%, #d4bb8d 45%, #b89a68 78%, #93764a 100%);
  }
  /* Distressed / degraded screen border */
  #stage::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 40;
    box-shadow:
      inset 0 0 60px 12px rgba(60,34,12,0.55),
      inset 0 0 160px 40px rgba(40,22,8,0.65),
      inset 0 0 8px 2px rgba(20,10,4,0.8);
    border: 14px solid transparent;
    border-image: repeating-linear-gradient(45deg,
      rgba(40,22,8,0.85) 0px, rgba(70,44,18,0.7) 6px, rgba(30,16,6,0.9) 12px) 14;
  }
  #grain {
    position: absolute; inset: 0; z-index: 30; pointer-events: none;
    opacity: 0.10; mix-blend-mode: multiply;
  }

  header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    text-align: center; padding: 18px 20px 8px; pointer-events: none;
  }
  header h1 {
    font-family: "Cinzel", serif; font-weight: 700; letter-spacing: 0.14em;
    font-size: clamp(1.2rem, 3.4vw, 2.5rem); margin: 0; color: var(--ink);
    text-shadow: 1px 1px 0 rgba(255,246,222,0.35), 2px 3px 6px rgba(30,16,6,0.35);
  }
  header p {
    font-style: italic; margin: 3px 0 0; font-size: clamp(0.78rem, 1.5vw, 1.02rem);
    color: var(--ink-soft); letter-spacing: 0.04em;
  }
  header .rule {
    width: min(340px, 60%); height: 14px; margin: 6px auto 0;
    background: no-repeat center/contain
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='340' height='14'><path d='M0 7 H150 M190 7 H340' stroke='%235c3a1e' stroke-width='1.4'/><path d='M170 7 l-12 -5 l0 10 z M170 7 l12 -5 l0 10 z' fill='%235c3a1e'/><circle cx='170' cy='7' r='3' fill='none' stroke='%235c3a1e' stroke-width='1.2'/></svg>");
    opacity: 0.8;
  }

  #map-wrap { position: absolute; inset: 0; z-index: 10; }
  svg#map { width: 100%; height: 100%; display: block; cursor: grab; }
  svg#map.grabbing { cursor: grabbing; }
  /* keep line weights constant regardless of zoom scale */
  .country, .graticule, .route { vector-effect: non-scaling-stroke; }

  .country {
    fill: var(--land); stroke: #7a5a30; stroke-width: 0.4px;
    transition: fill 0.18s ease, opacity 0.18s ease; cursor: default;
  }
  .country.has-empire { fill: var(--land-empire); cursor: pointer; }
  .country.dim { fill: var(--land); opacity: 0.55; }
  .country.era-on { fill: var(--land-hover); stroke: var(--ink); stroke-width: 0.55px; }
  .country.pinned { fill: var(--land-hover); stroke: var(--ink); stroke-width: 1.1px; }
  .country.active { fill: var(--land-hover) !important; stroke: var(--ink); stroke-width: 0.8px; opacity: 1 !important; }

  .graticule { fill: none; stroke: #6f5230; stroke-width: 0.35px; stroke-dasharray: 2 3; opacity: 0.35; }
  .sphere { fill: var(--sea); }

  /* Expedition route + site markers */
  .route { fill: none; stroke: var(--crimson); stroke-width: 1.4px; stroke-dasharray: 5 5; opacity: 0.75; }
  .marker circle.ring { fill: none; stroke: var(--crimson); stroke-width: 1px; opacity: 0.55; }
  .marker circle.dot { fill: var(--crimson); stroke: #f4e7c8; stroke-width: 1px; }
  .marker text {
    font-family: "Cinzel", serif; font-size: 0.5625rem; font-weight: 600; letter-spacing: 0.06em;
    fill: var(--ink); paint-order: stroke; stroke: #f2e3c0; stroke-width: 2.6px; stroke-linejoin: round;
  }
  .marker { pointer-events: none; }
  @keyframes pulse { 0%{ r:5; opacity:.6 } 100%{ r:11; opacity:0 } }
  .marker circle.ring { animation: pulse 1.9s ease-out infinite; }

  /* Hover tooltip (quick look) */
  #tip {
    position: absolute; z-index: 50; max-width: 290px; pointer-events: none;
    opacity: 0; transform: translateY(6px) rotate(-0.6deg);
    transition: opacity 0.15s ease, transform 0.15s ease;
    background: linear-gradient(135deg, #f2e3c0 0%, #e6d2a6 100%);
    color: var(--ink); padding: 12px 14px 13px; border: 1px solid #a9895a;
    box-shadow: 3px 6px 14px rgba(30,16,6,0.5);
  }
  #tip.show { opacity: 1; transform: translateY(0) rotate(-0.6deg); }
  #tip .modern {
    font-family: "Cinzel", serif; font-weight: 600; font-size: 0.68rem; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--crimson); border-bottom: 1px solid rgba(90,58,30,0.4);
    padding-bottom: 4px; margin-bottom: 7px;
  }
  #tip ul, #panel ul { list-style: none; margin: 0; padding: 0; }
  #tip li { margin: 0 0 8px; } #tip li:last-child { margin-bottom: 0; }
  .empire { font-family: "Cinzel", serif; font-weight: 600; font-size: 0.95rem; color: var(--ink); }
  .era { font-style: italic; font-size: 0.76rem; color: var(--gold); margin-left: 6px; }
  .blurb { display: block; font-size: 0.84rem; line-height: 1.35; color: var(--ink-soft); margin-top: 1px; }
  #tip .hint { font-size: 0.7rem; font-style: italic; color: var(--gold); margin-top: 8px; text-align: right; }

  /* Pinned side panel */
  #panel {
    position: absolute; top: 0; right: 0; z-index: 45; height: 100%;
    width: min(340px, 84vw); padding: 74px 22px 120px 22px;
    background: linear-gradient(135deg, #efe0bc 0%, #e2cd9f 100%);
    border-left: 3px double #9c7c4c;
    box-shadow: -8px 0 24px rgba(30,16,6,0.4);
    transform: translateX(105%); transition: transform 0.32s cubic-bezier(.2,.7,.2,1);
    overflow-y: auto;
  }
  #panel.open { transform: translateX(0); }
  #panel h2 {
    font-family: "Cinzel", serif; font-weight: 700; font-size: 1.15rem; letter-spacing: 0.08em;
    margin: 0 0 2px; color: var(--ink);
  }
  #panel .sub { font-style: italic; color: var(--crimson); font-size: 0.8rem; margin-bottom: 14px; letter-spacing: 0.05em; }
  #panel li {
    margin: 0 0 14px; padding: 8px 10px; cursor: pointer; border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  #panel li:hover { background: rgba(184,134,47,0.15); border-color: #b8862f; }
  #panel li .jump { display: block; font-size: 0.68rem; font-style: italic; color: var(--gold); margin-top: 4px; }
  #panelClose {
    position: absolute; top: 66px; right: 18px; z-index: 2;
    background: none; border: 1px solid var(--ink-soft); color: var(--ink);
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1rem;
    font-family: "Cinzel", serif; line-height: 1; transition: background 0.15s;
  }
  #panelClose:hover { background: rgba(138,47,34,0.15); }

  /* Timeline bar */
  #timeline {
    position: absolute; left: 50%; bottom: 46px; transform: translateX(-50%); z-index: 25;
    display: flex; align-items: center; gap: 12px;
    width: min(720px, 90vw); padding: 10px 18px;
    background: linear-gradient(135deg, rgba(242,227,192,0.94), rgba(220,199,159,0.94));
    border: 1px solid #a9895a; box-shadow: 2px 4px 12px rgba(30,16,6,0.4);
  }
  #timeline button {
    font-family: "Cinzel", serif; font-size: 0.78rem; letter-spacing: 0.06em;
    background: #efe0bc; color: var(--ink); border: 1px solid var(--ink-soft);
    padding: 5px 9px; cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  #timeline button:hover { background: var(--land-hover); }
  #slider { flex: 1; accent-color: var(--crimson); cursor: pointer; height: 4px; }
  #fontCtl {
    display: inline-flex; padding-left: 10px; white-space: nowrap;
    border-left: 1px solid rgba(90,58,30,0.35);
  }
  #fontCtl button { padding: 5px 7px; }
  #fontCtl #fontMinus { border-right: none; font-size: 0.66rem; }
  #fontCtl #fontPlus { font-size: 0.86rem; }
  #year {
    font-family: "Cinzel", serif; font-weight: 600; font-size: 0.92rem; letter-spacing: 0.05em;
    color: var(--ink); min-width: 92px; text-align: center; white-space: nowrap;
  }
  #allEras { display: none; }
  #allEras.show { display: inline-block; }

  footer {
    position: absolute; bottom: 14px; left: 0; right: 0; z-index: 20; text-align: center;
    font-style: italic; font-size: 0.78rem; color: var(--ink-soft); pointer-events: none;
  }
  footer .swatch {
    display: inline-block; width: 13px; height: 13px; background: var(--land-empire);
    border: 1px solid var(--ink); vertical-align: -2px; margin: 0 3px;
  }

  /* focused empire — its territory stays vivid, everything else recedes */
  .country.focus { stroke: var(--crimson); stroke-width: 1.8px; opacity: 1 !important; }
  .country.backdrop { opacity: 0.28; }
  .marker.faded { opacity: 0.25; }
  .marker.focused circle.dot { r: 4.5; }
  .marker.focused circle.ring { stroke-width: 1.6px; }
  .marker.focused text { font-size: 0.75rem; }

  /* Search */
  #search-wrap { position: absolute; top: 72px; left: 18px; z-index: 26; width: 232px; }
  #search {
    width: 100%; font-family: "IM Fell English", serif; font-size: 0.92rem; color: var(--ink);
    background: linear-gradient(135deg, rgba(242,227,192,0.96), rgba(220,199,159,0.96));
    border: 1px solid #a9895a; padding: 8px 12px; outline: none;
    box-shadow: 2px 3px 8px rgba(30,16,6,0.32);
  }
  #search::placeholder { color: var(--ink-soft); font-style: italic; opacity: 0.8; }
  #results {
    margin-top: 4px; max-height: 300px; overflow-y: auto;
    background: linear-gradient(135deg, #f2e3c0, #e6d2a6); border: 1px solid #a9895a;
    box-shadow: 2px 5px 12px rgba(30,16,6,0.4); display: none;
  }
  #results.show { display: block; }
  #results .res {
    padding: 6px 12px; cursor: pointer; border-bottom: 1px solid rgba(90,58,30,0.18);
    transition: background 0.12s;
  }
  #results .res:last-child { border-bottom: none; }
  #results .res:hover, #results .res.sel { background: rgba(184,134,47,0.22); }
  #results .rn { font-family: "Cinzel", serif; font-size: 0.86rem; color: var(--ink); }
  #results .rm { font-size: 0.72rem; font-style: italic; color: var(--gold); margin-left: 6px; }
  #results .rk {
    display: inline-block; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--crimson); border: 1px solid rgba(138,47,34,0.5); padding: 0 4px; margin-right: 7px; vertical-align: 1px;
  }
  #results .empty { padding: 8px 12px; font-style: italic; color: var(--ink-soft); font-size: 0.82rem; }

  /* Legend of empires active at the current year */
  #legend {
    position: absolute; left: 18px; bottom: 46px; z-index: 24; width: 232px;
    max-height: 46vh; overflow-y: auto; display: none;
    background: linear-gradient(135deg, rgba(242,227,192,0.94), rgba(220,199,159,0.94));
    border: 1px solid #a9895a; box-shadow: 2px 4px 12px rgba(30,16,6,0.4); padding: 10px 12px;
  }
  #legend.show { display: block; }
  #legend h3 {
    font-family: "Cinzel", serif; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--crimson); margin: 0 0 8px; border-bottom: 1px solid rgba(90,58,30,0.4); padding-bottom: 5px;
  }
  #legend .row {
    display: flex; align-items: baseline; gap: 8px; padding: 3px 4px; cursor: pointer;
    transition: background 0.12s;
  }
  #legend .row:hover { background: rgba(184,134,47,0.2); }
  #legend .row.sel {
    background: rgba(138,47,34,0.14);
    border-left: 3px solid var(--crimson); padding-left: 6px;
  }
  #legend .row.sel .ln { color: var(--crimson); }
  #legend .sw { width: 13px; height: 13px; flex: 0 0 13px; border: 1px solid var(--ink); transform: translateY(2px); }
  #legend .ln { font-family: "Cinzel", serif; font-size: 0.82rem; color: var(--ink); line-height: 1.2; }
  #legend .le { display: block; font-size: 0.68rem; font-style: italic; color: var(--gold); }

  /* ---- Field photographs (Wikipedia thumbnails, sepia-toned) ---- */
  li.emprow { display: flex; gap: 10px; align-items: flex-start; }
  li.emprow > div:last-child { min-width: 0; }
  .thumb {
    width: 46px; height: 46px; flex: 0 0 46px; display: none;
    background: #cbb489 center/cover no-repeat;
    border: 1px solid #8a6b3e; box-shadow: 1px 2px 4px rgba(30,16,6,0.35);
    filter: sepia(0.35) saturate(0.85) contrast(0.97);
  }
  .thumb.on { display: block; }
  .wframe {
    margin: 0 0 12px; padding: 5px 5px 6px; display: none;
    background: #efe0bc; border: 1px solid #8a6b3e;
    box-shadow: 2px 3px 8px rgba(30,16,6,0.35); transform: rotate(-0.5deg);
  }
  .wframe.on { display: block; }
  .wframe img {
    width: 100%; height: 150px; object-fit: cover; display: block;
    border: 1px solid #a9895a; filter: sepia(0.35) saturate(0.9) contrast(0.97);
  }
  .extract { font-size: 0.84rem; line-height: 1.45; color: var(--ink-soft); margin: 0 0 12px; }
  .links { margin: 0 0 16px; display: flex; flex-wrap: wrap; gap: 8px; }
  .links a {
    font-family: "Cinzel", serif; font-size: 0.72rem; letter-spacing: 0.08em;
    color: var(--crimson); text-decoration: none;
    border: 1px solid rgba(138,47,34,0.45); padding: 4px 9px;
    background: rgba(138,47,34,0.06); transition: background 0.15s;
  }
  .links a:hover { background: rgba(138,47,34,0.16); }
  .rowlink {
    font-size: 0.7rem; font-style: italic; color: var(--crimson);
    text-decoration: none; border-bottom: 1px dotted rgba(138,47,34,0.5);
  }
  .rowlink:hover { border-bottom-style: solid; }

  #loading {
    position: absolute; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
    font-family: "Cinzel", serif; letter-spacing: 0.2em; color: var(--ink); font-size: 1rem;
  }

  @media (max-width: 640px) {
    #panel { width: 100%; height: auto; bottom: 0; top: auto; padding: 20px 20px 30px;
             border-left: none; border-top: 3px double #9c7c4c; transform: translateY(105%);
             max-height: 62%; box-shadow: 0 -8px 24px rgba(30,16,6,0.4); }
    #panel.open { transform: translateY(0); }
    #panelClose { top: 16px; }
    #timeline { bottom: 8px; gap: 8px; padding: 8px 12px; }
    #timeline button { padding: 4px 6px; font-size: 0.68rem; }
    #year { min-width: 74px; font-size: 0.8rem; }
    footer { display: none; }
    #search-wrap { width: 46vw; }
    #legend { width: 42vw; bottom: 54px; max-height: 34vh; }
  }
</style>
</head>
<body>
  <div id="stage">
    <header>
      <h1>Atlas of Long Gone Empires</h1>
      <p>Hover to glimpse · click to pin · search or slide the ages · scroll to zoom, drag to pan</p>
      <div class="rule"></div>
    </header>

    <div id="map-wrap">
      <svg id="map" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <div id="search-wrap">
      <input id="search" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search an empire or land…" />
      <div id="results"></div>
    </div>

    <div id="legend"></div>

    <div id="tip"></div>

    <aside id="panel">
      <button id="panelClose" title="Close">✕</button>
      <div id="panelBody"></div>
    </aside>

    <div id="timeline">
      <button id="play" title="Play through the ages">▶</button>
      <input id="slider" type="range" min="-4500" max="2000" step="25" value="-4500" />
      <span id="year">All eras</span>
      <button id="allEras" title="Clear the timeline filter">✦ all eras</button>
      <span id="fontCtl">
        <button id="fontMinus" title="Smaller text">A−</button><!--
     --><button id="fontPlus" title="Larger text">A+</button>
      </span>
    </div>

    <footer>
      <span class="swatch"></span> lands with recorded empires &nbsp;·&nbsp; <span id="count"></span> empires charted
    </footer>

    <svg id="grain" xmlns="http://www.w3.org/2000/svg">
      <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
      <rect width="100%" height="100%" filter="url(#noise)"/>
    </svg>

    <div id="loading">UNROLLING THE MAP…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="empires.js"></script>
  <script>
  (function () {
    const svg = d3.select("#map");
    const gRoot = svg.append("g");
    const gCountries = gRoot.append("g");
    const gMarkers = gRoot.append("g");
    const projection = d3.geoNaturalEarth1();
    const path = d3.geoPath(projection);

    const tip = document.getElementById("tip");
    const stage = document.getElementById("stage");
    const panel = document.getElementById("panel");
    const panelBody = document.getElementById("panelBody");
    const slider = document.getElementById("slider");
    const yearLabel = document.getElementById("year");
    const playBtn = document.getElementById("play");
    const allErasBtn = document.getElementById("allEras");
    const legend = document.getElementById("legend");
    const searchInput = document.getElementById("search");
    const results = document.getElementById("results");

    // ---- data model: empires + inverted country index ----
    const EMP = window.EMPIRES;
    const byId = {};
    const countryEmpires = {};      // country name -> [empires], sorted by start
    const empireCountries = new Set();
    EMP.forEach(e => {
      byId[e.id] = e;
      e.territorySet = new Set(e.territory);
      e.territory.forEach(c => {
        empireCountries.add(c);
        (countryEmpires[c] = countryEmpires[c] || []).push(e);
      });
    });
    Object.values(countryEmpires).forEach(l => l.sort((a, b) => a.start - b.start));
    document.getElementById("count").textContent = EMP.length;

    let countriesGeo = null;
    let nameNeighbors = {};         // country -> Set of bordering country names
    let zoom = null;

    // Muted, aged palette. Concurrent (bordering) empires are map-coloured from
    // this set each frame so no two touching realms share a hue.
    const PALETTE = [
      "#b46a4d", "#c39a41", "#5f867e", "#90566a",
      "#5f6f92", "#869a5b", "#a06a3e", "#7a7f9c", "#728c6f"
    ];

    // framing animation duration; ?instant=1 disables it (tests, reduced motion)
    const FRAME_MS = (new URLSearchParams(location.search).has("instant") ||
      window.matchMedia("(prefers-reduced-motion: reduce)").matches) ? 0 : 700;

    // ---- state ----
    let pinned = null;      // pinned country (panel lists who ruled it)
    let focusId = null;     // focused empire (whole territory outlined)
    let timelineOn = false;
    let year = -4500;
    let playing = false, playTimer = null;
    let currentK = 1;       // zoom scale (markers counter-scale to stay legible)
    let colorMap = {};      // empire id -> colour for the current frame

    // ---- helpers ----
    const fmtYear = y => y === 0 ? "1 AD" : (y < 0 ? Math.abs(y) + " BC" : y + " AD");
    const midEra = e => Math.round((e.start + e.end) / 2);
    const activeAt = (e, y) => y >= e.start && y <= e.end;
    const activeEmpires = y => EMP.filter(e => activeAt(e, y));

    // ---- Wikipedia field notes (thumbnail + summary), lazily fetched & cached ----
    const wikiUrl = e => "https://en.wikipedia.org/wiki/" + encodeURIComponent(e.wiki.replace(/ /g, "_"));
    const britUrl = e => "https://www.britannica.com/search?query=" + encodeURIComponent(e.name);
    const wikiCache = {};
    const summaryOf = title =>
      fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" +
        encodeURIComponent(title.replace(/ /g, "_")))
        .then(r => r.ok ? r.json() : null).catch(() => null);
    function fetchWiki(e) {
      if (wikiCache[e.id]) return wikiCache[e.id];
      // text comes from the empire's article; the hero image from its curated
      // monument article (imageWiki) when one exists, else its own lead image
      wikiCache[e.id] = Promise.all([
        summaryOf(e.wiki),
        e.imageWiki ? summaryOf(e.imageWiki) : Promise.resolve(null)
      ]).then(([j, img]) => ({
        thumb: (img && img.thumbnail && img.thumbnail.source) ||
               (j && j.thumbnail && j.thumbnail.source) || null,
        extract: (j && j.extract) || null,
        url: (j && j.content_urls && j.content_urls.desktop.page) || wikiUrl(e)
      }));
      return wikiCache[e.id];
    }
    // hydrate .thumb[data-tid] placeholders inside a container, if still relevant
    function hydrateThumbs(container, empires, stillValid) {
      empires.forEach(d => fetchWiki(d).then(info => {
        if (!info.thumb || !stillValid()) return;
        const el = container.querySelector(`.thumb[data-tid="${d.id}"]`);
        if (el) { el.style.backgroundImage = `url("${info.thumb}")`; el.classList.add("on"); }
      }));
    }

    // two empires are adjacent if they share a land, or any of their lands border
    function empiresAdjacent(a, b) {
      for (const c of a.territory) if (b.territorySet.has(c)) return true;
      for (const c of a.territory) {
        const nb = nameNeighbors[c];
        if (nb) for (const n of nb) if (b.territorySet.has(n)) return true;
      }
      return false;
    }

    // greedy-colour the active empires so touching realms differ
    function assignColors(active) {
      const rank = {};
      const ordered = active.slice().sort((a, b) => a.start - b.start || (a.id < b.id ? -1 : 1));
      ordered.forEach(e => {
        const used = new Set();
        ordered.forEach(o => { if (rank[o.id] !== undefined && empiresAdjacent(e, o)) used.add(rank[o.id]); });
        let c = 0; while (used.has(c)) c++;
        rank[e.id] = c;
      });
      const out = {};
      ordered.forEach(e => { out[e.id] = PALETTE[rank[e.id] % PALETTE.length]; });
      return out;
    }

    // among active empires covering a country, the most specific one owns its colour
    function dominantEmpire(country, active) {
      let best = null;
      for (const e of active) {
        if (!e.territorySet.has(country)) continue;
        if (!best || e.territory.length < best.territory.length ||
            (e.territory.length === best.territory.length && e.start > best.start)) best = e;
      }
      return best;
    }

    // ---- master paint ----
    function paint() {
      svg.classed("mode-timeline", timelineOn);
      const active = timelineOn ? activeEmpires(year) : [];
      colorMap = timelineOn ? assignColors(active) : {};
      const focusSet = focusId ? byId[focusId].territorySet : null;

      gCountries.selectAll("path.country").each(function (d) {
        const name = d.properties.name;
        const sel = d3.select(this);
        const inFocus = !!focusSet && focusSet.has(name);
        sel.classed("has-empire", empireCountries.has(name));
        sel.classed("pinned", name === pinned);
        sel.classed("focus", inFocus);
        // everything outside the focused empire recedes to a ghostly backdrop
        sel.classed("backdrop", !!focusSet && !inFocus);
        if (timelineOn) {
          const dom = dominantEmpire(name, active);
          sel.classed("era-on", !!dom).classed("dim", !dom && empireCountries.has(name));
          if (inFocus) {
            // the focused empire owns its lands outright, even where realms overlap
            sel.style("fill", colorMap[focusId] || "var(--land-hover)");
          } else {
            sel.style("fill", dom ? colorMap[dom.id] : null);
          }
        } else {
          sel.classed("era-on", false).classed("dim", false);
          sel.style("fill", inFocus ? "var(--land-hover)" : null);
        }
      });

      updateMarkers(active);
      updateLegend(active);
    }

    // ---- markers (capitals), coloured to match each empire ----
    function markerSet(active) {
      const out = [], seen = new Set();
      const add = (e, color) => {
        if (seen.has(e.id)) return;
        seen.add(e.id);
        out.push({ id: e.id, name: e.capital.name, coords: e.capital.coords, color });
      };
      active.forEach(e => add(e, colorMap[e.id]));
      if (focusId) add(byId[focusId], colorMap[focusId] || "var(--crimson)");
      return out;
    }

    function updateMarkers(active) {
      const data = markerSet(active || (timelineOn ? activeEmpires(year) : []));
      const m = gMarkers.selectAll("g.marker").data(data, d => d.id);
      m.exit().remove();
      const enter = m.enter().append("g").attr("class", "marker");
      enter.append("circle").attr("class", "ring").attr("r", 5);
      enter.append("circle").attr("class", "dot").attr("r", 3);
      enter.append("text").attr("dx", 8).attr("dy", 3);
      const all = enter.merge(m);
      all.classed("focused", d => d.id === focusId)
         .classed("faded", d => !!focusId && d.id !== focusId);
      all.select("circle.ring").attr("stroke", d => d.color);
      all.select("circle.dot").attr("fill", d => d.color)
         .attr("r", d => d.id === focusId ? 4.5 : 3);
      all.select("text").text(d => d.name).attr("fill", d => d.color);
      positionMarkers();
    }

    // counter-scale so dots/labels keep a constant size at any zoom
    function positionMarkers() {
      gMarkers.selectAll("g.marker").attr("transform", d => {
        const p = projection(d.coords);
        return p ? `translate(${p[0]},${p[1]}) scale(${1 / currentK})` : "translate(-999,-999)";
      });
    }

    // ---- legend of empires active at the current year ----
    function updateLegend(active) {
      if (!timelineOn || !active.length) { legend.classList.remove("show"); return; }
      const rows = active.slice().sort((a, b) => a.start - b.start).map(e =>
        `<div class="row${e.id === focusId ? " sel" : ""}" data-id="${e.id}">` +
        `<span class="sw" style="background:${colorMap[e.id]}"></span>` +
        `<span class="ln">${e.name}<span class="le">${e.era}</span></span></div>`).join("");
      legend.innerHTML = `<h3>${fmtYear(year)} — ${active.length} realm${active.length === 1 ? "" : "s"}</h3>${rows}`;
      legend.classList.add("show");
      legend.querySelectorAll(".row").forEach(r =>
        r.addEventListener("click", () => selectEmpire(r.getAttribute("data-id"))));
    }

    function render() {
      const w = stage.clientWidth, h = stage.clientHeight;
      svg.attr("viewBox", `0 0 ${w} ${h}`);
      if (!countriesGeo) return;
      projection.fitExtent([[20, 84], [w - 20, h - 70]], countriesGeo);
      gCountries.selectAll("path.country").attr("d", path);
      gCountries.selectAll("path.sphere").attr("d", path);
      gCountries.selectAll("path.graticule").attr("d", path);
      positionMarkers();
    }

    // ---- tooltip: every empire that ever ruled the hovered land ----
    function moveTip(evt) {
      const pad = 18; let x = evt.clientX + pad, y = evt.clientY + pad;
      const r = tip.getBoundingClientRect();
      if (x + r.width > window.innerWidth - 10) x = evt.clientX - r.width - pad;
      if (y + r.height > window.innerHeight - 10) y = evt.clientY - r.height - pad;
      x = Math.max(10, x); y = Math.max(10, y);   // never off-screen
      tip.style.left = x + "px"; tip.style.top = y + "px";
    }
    let tipCountry = null;
    function showTip(name) {
      const data = countryEmpires[name]; if (!data) return;
      tipCountry = name;
      const MAX = 5;                       // long chronicles continue in the pin
      const shown = data.slice(0, MAX);
      const more = data.length - shown.length;
      const items = shown.map(d =>
        `<li class="emprow"><div class="thumb" data-tid="${d.id}"></div><div>` +
        `<span class="empire">${d.name}</span><span class="era">${d.era}</span>` +
        `<span class="blurb">${d.blurb}</span></div></li>`).join("");
      tip.innerHTML = `<div class="modern">${name}</div><ul>${items}</ul>` +
        `<div class="hint">${more > 0 ? `+${more} more · ` : ""}click to pin for field notes &amp; links ✦</div>`;
      tip.classList.add("show");
      hydrateThumbs(tip, shown, () => tipCountry === name);
    }
    const hideTip = () => { tipCountry = null; tip.classList.remove("show"); };

    // ---- panels ----
    function openCountryPanel(name) {
      pinned = name; focusId = null;
      const data = countryEmpires[name] || [];
      const items = data.map(d =>
        `<li class="emprow" data-id="${d.id}"><div class="thumb" data-tid="${d.id}"></div><div>` +
        `<span class="empire">${d.name}</span><span class="era">${d.era}</span>` +
        `<span class="blurb">${d.blurb}</span>` +
        `<span class="jump">✦ reveal this empire · <a class="rowlink" href="${wikiUrl(d)}" ` +
        `target="_blank" rel="noopener">Wikipedia ↗</a></span></div></li>`).join("");
      panelBody.innerHTML = `<h2>${name}</h2><div class="sub">${data.length} empire${data.length === 1 ? "" : "s"} ruled here</div><ul>${items}</ul>`;
      panelBody.querySelectorAll("li").forEach(li =>
        li.addEventListener("click", () => selectEmpire(li.getAttribute("data-id"))));
      panelBody.querySelectorAll("a.rowlink").forEach(a =>
        a.addEventListener("click", evt => evt.stopPropagation()));
      panel.classList.add("open");
      hydrateThumbs(panelBody, data, () => pinned === name);
      paint();
    }
    function openEmpirePanel(id) {
      const e = byId[id];
      const terr = e.territory.slice().sort().join(" · ");
      panelBody.innerHTML =
        `<h2>${e.name}</h2><div class="sub">${e.era} · ${e.territory.length} modern land${e.territory.length === 1 ? "" : "s"}</div>` +
        `<figure class="wframe" id="wframe"><img id="wimg" alt="${e.name}"></figure>` +
        `<p class="blurb" style="margin:0 0 10px">${e.blurb}</p>` +
        `<p class="extract" id="wextract"></p>` +
        `<div class="links">` +
        `<a id="wlink" href="${wikiUrl(e)}" target="_blank" rel="noopener">Wikipedia ↗</a>` +
        `<a href="${britUrl(e)}" target="_blank" rel="noopener">Britannica ↗</a>` +
        `</div>` +
        `<div class="empire" style="font-size:.8rem;color:var(--crimson);margin-bottom:4px">Capital · ${e.capital.name}</div>` +
        `<div style="font-size:.82rem;line-height:1.55;color:var(--ink-soft)">${terr}</div>`;
      panel.classList.add("open");
      fetchWiki(e).then(info => {
        if (focusId !== id) return;   // the panel has moved on
        if (info.thumb) {
          document.getElementById("wimg").src = info.thumb;
          document.getElementById("wframe").classList.add("on");
        }
        if (info.extract) document.getElementById("wextract").textContent = info.extract;
        document.getElementById("wlink").href = info.url;
      });
    }
    function closePanel() {
      pinned = null; focusId = null; panel.classList.remove("open");
      paint();
    }

    // reveal an empire: outline its whole territory, frame it, jump to its era
    function selectEmpire(id) {
      const e = byId[id]; if (!e) return;
      focusId = id; pinned = null;
      setTimeline(true, midEra(e));   // shows it coloured amid its contemporaries
      openEmpirePanel(id);
      frameCountries(e.territory);
    }

    // ---- timeline ----
    function setTimeline(on, y) {
      timelineOn = on;
      if (typeof y === "number") { year = Math.max(-4500, Math.min(2000, y)); slider.value = year; }
      yearLabel.textContent = on ? fmtYear(year) : "All eras";
      allErasBtn.classList.toggle("show", on);
      paint();
    }
    function stopPlay() { playing = false; playBtn.textContent = "▶"; if (playTimer) { clearInterval(playTimer); playTimer = null; } }
    function startPlay() {
      playing = true; playBtn.textContent = "❚❚";
      setTimeline(true, (!timelineOn || +slider.value >= 2000) ? -4500 : +slider.value);
      playTimer = setInterval(() => { let y = year + 25; if (y > 2000) y = -4500; setTimeline(true, y); }, 90);
    }

    slider.addEventListener("input", () => { stopPlay(); setTimeline(true, +slider.value); });
    playBtn.addEventListener("click", () => { playing ? stopPlay() : startPlay(); });
    allErasBtn.addEventListener("click", () => { stopPlay(); focusId = null; setTimeline(false); });

    // ---- font size (A− / A+): scales all rem-based type, persisted ----
    let fontScale = +(localStorage.getItem("atlas-font") || 1) || 1;
    function applyFont() {
      fontScale = Math.max(0.75, Math.min(1.5, fontScale));
      document.documentElement.style.fontSize = (16 * fontScale) + "px";
      localStorage.setItem("atlas-font", fontScale);
    }
    applyFont();
    document.getElementById("fontMinus").addEventListener("click", () => { fontScale -= 0.125; applyFont(); });
    document.getElementById("fontPlus").addEventListener("click", () => { fontScale += 0.125; applyFont(); });
    document.getElementById("panelClose").addEventListener("click", closePanel);
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") { hideResults(); closePanel(); stopPlay(); focusId = null; setTimeline(false); }
    });

    // ---- search (empires + lands) ----
    let searchHits = [];
    function runSearch(q) {
      q = q.trim().toLowerCase();
      if (!q) { hideResults(); return; }
      const emps = EMP.filter(e => e.name.toLowerCase().includes(q)).slice(0, 8)
        .map(e => ({ kind: "empire", id: e.id, name: e.name, meta: e.era }));
      const lands = [...empireCountries].filter(c => c.toLowerCase().includes(q)).sort().slice(0, 5)
        .map(c => ({ kind: "land", name: c, meta: (countryEmpires[c] || []).length + " empires" }));
      searchHits = emps.concat(lands);
      if (!searchHits.length) { results.innerHTML = `<div class="empty">No empire or land found.</div>`; results.classList.add("show"); return; }
      results.innerHTML = searchHits.map((h, i) =>
        `<div class="res" data-i="${i}"><span class="rk">${h.kind === "empire" ? "Empire" : "Land"}</span>` +
        `<span class="rn">${h.name}</span><span class="rm">${h.meta}</span></div>`).join("");
      results.classList.add("show");
      results.querySelectorAll(".res").forEach(r =>
        r.addEventListener("click", () => chooseHit(searchHits[+r.getAttribute("data-i")])));
    }
    function chooseHit(h) {
      if (!h) return;
      hideResults(); searchInput.blur();
      if (h.kind === "empire") selectEmpire(h.id);
      else { openCountryPanel(h.name); frameCountries([h.name]); }
    }
    const hideResults = () => results.classList.remove("show");
    searchInput.addEventListener("input", () => runSearch(searchInput.value));
    searchInput.addEventListener("focus", () => { if (searchInput.value) runSearch(searchInput.value); });
    searchInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && searchHits.length) chooseHit(searchHits[0]);
      else if (e.key === "Escape") { hideResults(); searchInput.blur(); }
    });
    document.addEventListener("click", e => { if (!e.target.closest("#search-wrap")) hideResults(); });

    // ---- frame a group of countries in the visible viewport ----
    // The side panel, legend, and timeline bar all eat into the stage, so fit
    // the territory into the rectangle that actually remains uncovered.
    function visibleRect() {
      const w = stage.clientWidth, h = stage.clientHeight;
      const mobile = window.innerWidth <= 640;
      const panelOpen = panel.classList.contains("open");
      let x0 = 20, x1 = w - 20, y0 = 90, y1 = h - 110;
      if (!mobile) {
        if (legend.classList.contains("show")) x0 = 270;           // legend column, lower-left
        if (panelOpen) x1 = w - panel.offsetWidth - 20;            // side panel, right
      } else if (panelOpen) {
        y1 = Math.min(y1, h - panel.offsetHeight - 16);            // bottom sheet
      }
      if (x1 - x0 < 120) { x0 = 20; x1 = w - 20; }                 // degenerate guard
      if (y1 - y0 < 120) { y0 = 90; y1 = h - 110; }
      return { x0, x1, y0, y1 };
    }

    function frameCountries(countryNames) {
      if (!countriesGeo || !zoom) return;
      const set = new Set(countryNames);
      const feats = countriesGeo.features.filter(f => set.has(f.properties.name));
      if (!feats.length) return;
      const b = path.bounds({ type: "FeatureCollection", features: feats });
      const { x0, x1, y0, y1 } = visibleRect();
      const vw = x1 - x0, vh = y1 - y0;
      const dx = b[1][0] - b[0][0], dy = b[1][1] - b[0][1];
      const k = Math.max(1, Math.min(10, 0.85 / Math.max(dx / vw, dy / vh)));
      const cx = (b[0][0] + b[1][0]) / 2, cy = (b[0][1] + b[1][1]) / 2;
      const t = d3.zoomIdentity
        .translate((x0 + x1) / 2 - k * cx, (y0 + y1) / 2 - k * cy)
        .scale(k);
      // synchronous apply when not animating — a 0ms transition still waits
      // for an animation frame, which throttled/background tabs may never get
      if (FRAME_MS) svg.transition().duration(FRAME_MS).call(zoom.transform, t);
      else svg.call(zoom.transform, t);
    }

    // ---- load geography (bundled locally, offline-friendly) ----
    d3.json("countries-110m.json").then(world => {
      countriesGeo = topojson.feature(world, world.objects.countries);
      const geoms = world.objects.countries.geometries;
      const neigh = topojson.neighbors(geoms);
      geoms.forEach((g, i) => {
        nameNeighbors[g.properties.name] = new Set(neigh[i].map(j => geoms[j].properties.name));
      });

      gCountries.append("path").attr("class", "sphere").datum({ type: "Sphere" });
      gCountries.append("path").attr("class", "graticule").datum(d3.geoGraticule10());

      gCountries.selectAll("path.country")
        .data(countriesGeo.features)
        .join("path")
        .attr("class", d => "country" + (empireCountries.has(d.properties.name) ? " has-empire" : ""))
        .on("mousemove", (evt, d) => { if (countryEmpires[d.properties.name]) moveTip(evt); else hideTip(); })
        .on("mouseenter", function (evt, d) {
          if (!countryEmpires[d.properties.name]) return;
          d3.select(this).classed("active", true);
          showTip(d.properties.name); moveTip(evt);
        })
        .on("mouseleave", function () { d3.select(this).classed("active", false); hideTip(); })
        .on("click", (evt, d) => {
          if (!countryEmpires[d.properties.name]) { closePanel(); return; }
          evt.stopPropagation();
          openCountryPanel(d.properties.name);
        });

      gCountries.select("path.sphere").on("click", closePanel);

      zoom = d3.zoom()
        .scaleExtent([1, 12])
        .translateExtent([[0, 0], [stage.clientWidth, stage.clientHeight]])
        .on("zoom", (evt) => { currentK = evt.transform.k; gRoot.attr("transform", evt.transform); positionMarkers(); })
        .on("start", () => svg.classed("grabbing", true))
        .on("end", () => svg.classed("grabbing", false));
      svg.call(zoom).on("dblclick.zoom", null);

      document.getElementById("loading").remove();
      render();
      paint();
    }).catch(err => {
      document.getElementById("loading").textContent = "The map was lost to the sands… (failed to load geography)";
      console.error(err);
    });

    window.addEventListener("resize", render);
  })();
  </script>
</body>
</html>
