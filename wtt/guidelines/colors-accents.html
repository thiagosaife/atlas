<!-- @dsCard group="Colors" viewport="700x170" name="Accents" subtitle="Gold, gilt, crimson — and their washes" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:14px 16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .sw { flex:1; min-width:52px; }
  .chip { height:52px; border:1px solid var(--line-1); }
  .lbl { font-family: monospace; font-size:9.5px; line-height:1.35; color: var(--ink-soft); margin-top:4px; }

</style></head><body>
<div class="row"><div class="sw"><div class="chip" style="background:var(--gold)"></div><div class="lbl">--gold<br>#b8862f</div></div><div class="sw"><div class="chip" style="background:var(--gilt)"></div><div class="lbl">--gilt<br>#e0b64d</div></div><div class="sw"><div class="chip" style="background:var(--crimson)"></div><div class="lbl">--crimson<br>#8a2f22</div></div><div class="sw"><div class="chip" style="background:var(--surface-hover)"></div><div class="lbl">--surface-hover<br>gold wash 15%</div></div><div class="sw"><div class="chip" style="background:var(--surface-selected)"></div><div class="lbl">--surface-selected<br>crimson wash 14%</div></div></div>
<div style="margin-top:9px; font-size:0.78rem; font-style:italic; color:var(--ink-soft)">gold = era text · gilt = hover/selection fill · crimson = labels, links, routes, focus</div></body></html>
