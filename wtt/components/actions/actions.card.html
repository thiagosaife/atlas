<!-- @dsCard group="Components" viewport="700x250" name="Actions" subtitle="Button · IconButton · LinkChip" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="../../card-support.js"></script>
<style>
  body { margin:0; padding:16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .cap { font-family: monospace; font-size:9.5px; color: var(--ink-soft); margin:10px 0 5px; }
  .cap:first-child { margin-top:0; }
</style></head><body>
<div id="root"></div>
<script type="text/babel">
window.loadCardComponents([
  ["../actions/Button.jsx", "Button"],
  ["../actions/IconButton.jsx", "IconButton"],
  ["../actions/LinkChip.jsx", "LinkChip"],
  ["../forms/SearchField.jsx", "SearchField"],
  ["../forms/RangeSlider.jsx", "RangeSlider"],
  ["../surfaces/ParchmentCard.jsx", "ParchmentCard"],
  ["../surfaces/TornNote.jsx", "TornNote"],
  ["../surfaces/PhotoFrame.jsx", "PhotoFrame"],
  ["../surfaces/Rule.jsx", "Rule"],
  ["../display/Swatch.jsx", "Swatch"],
  ["../display/Badge.jsx", "Badge"],
  ["../display/LegendRow.jsx", "LegendRow"],
  ["../display/EmpireRow.jsx", "EmpireRow"],
], "../../_ds_bundle.js").then((NS) => {
const { Button, IconButton, LinkChip } = NS;

function App() {
  return (
    <div>
      <div className="cap">Button — md / sm / active / disabled</div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <Button>▶ Play</Button>
        <Button>✦ all eras</Button>
        <Button size="sm">A−</Button>
        <Button size="sm">A+</Button>
        <Button active>1450 AD</Button>
        <Button disabled>Disabled</Button>
      </div>
      <div className="cap">IconButton</div>
      <div style={{ display: "flex", gap: 8 }}>
        <IconButton title="Close">✕</IconButton>
        <IconButton title="Flourish">✦</IconButton>
      </div>
      <div className="cap">LinkChip</div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <LinkChip href="#">Wikipedia ↗</LinkChip>
        <LinkChip href="#">Britannica ↗</LinkChip>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
});

</script>
</body></html>
