<!-- @dsCard group="Spacing" viewport="700x220" name="Component paddings" subtitle="Exact odd values from the source — never grid-snapped" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:14px 16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .sw { flex:1; min-width:52px; }
  .chip { height:52px; border:1px solid var(--line-1); }
  .lbl { font-family: monospace; font-size:9.5px; line-height:1.35; color: var(--ink-soft); margin-top:4px; }

</style></head><body>
<div style="display:flex; align-items:center; gap:12px; margin-bottom:5px"><span style="font-family:monospace; font-size:9.5px; color:var(--ink-soft); width:130px">--pad-button</span><span style="display:inline-block; background:var(--paper-2); border:1px solid var(--ink-soft); padding:5px 9px; font-family:var(--font-display); font-size:0.72rem; letter-spacing:0.06em">5px 9px</span></div><div style="display:flex; align-items:center; gap:12px; margin-bottom:5px"><span style="font-family:monospace; font-size:9.5px; color:var(--ink-soft); width:130px">--pad-button-sm</span><span style="display:inline-block; background:var(--paper-2); border:1px solid var(--ink-soft); padding:4px 6px; font-family:var(--font-display); font-size:0.72rem; letter-spacing:0.06em">4px 6px</span></div><div style="display:flex; align-items:center; gap:12px; margin-bottom:5px"><span style="font-family:monospace; font-size:9.5px; color:var(--ink-soft); width:130px">--pad-input</span><span style="display:inline-block; background:var(--paper-2); border:1px solid var(--ink-soft); padding:8px 12px; font-family:var(--font-display); font-size:0.72rem; letter-spacing:0.06em">8px 12px</span></div><div style="display:flex; align-items:center; gap:12px; margin-bottom:5px"><span style="font-family:monospace; font-size:9.5px; color:var(--ink-soft); width:130px">--pad-note</span><span style="display:inline-block; background:var(--paper-2); border:1px solid var(--ink-soft); padding:12px 14px 13px; font-family:var(--font-display); font-size:0.72rem; letter-spacing:0.06em">12px 14px 13px</span></div><div style="display:flex; align-items:center; gap:12px; margin-bottom:5px"><span style="font-family:monospace; font-size:9.5px; color:var(--ink-soft); width:130px">--pad-chip</span><span style="display:inline-block; background:var(--paper-2); border:1px solid var(--ink-soft); padding:4px 9px; font-family:var(--font-display); font-size:0.72rem; letter-spacing:0.06em">4px 9px</span></div><div style="display:flex; align-items:center; gap:12px; margin-bottom:5px"><span style="font-family:monospace; font-size:9.5px; color:var(--ink-soft); width:130px">--pad-legend</span><span style="display:inline-block; background:var(--paper-2); border:1px solid var(--ink-soft); padding:10px 12px; font-family:var(--font-display); font-size:0.72rem; letter-spacing:0.06em">10px 12px</span></div><div style="display:flex; align-items:center; gap:12px; margin-bottom:5px"><span style="font-family:monospace; font-size:9.5px; color:var(--ink-soft); width:130px">--pad-bar</span><span style="display:inline-block; background:var(--paper-2); border:1px solid var(--ink-soft); padding:10px 18px; font-family:var(--font-display); font-size:0.72rem; letter-spacing:0.06em">10px 18px</span></div></body></html>
