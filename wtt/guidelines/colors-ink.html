<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:14px 16px; background: var(--paper-5); font-family: var(--font-body); color: var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .sw { flex:1; min-width:52px; }
  .chip { height:52px; border:1px solid var(--line-1); }
  .lbl { font-family: monospace; font-size:9.5px; line-height:1.35; color: var(--ink-soft); margin-top:4px; }

</style></head><body>
<div class="row"><div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="lbl">--ink<br>#40260f</div></div><div class="sw"><div class="chip" style="background:var(--ink-soft)"></div><div class="lbl">--ink-soft<br>#5c3a1e</div></div><div class="sw"><div class="chip" style="background:var(--line-1)"></div><div class="lbl">--line-1<br>#a9895a</div></div><div class="sw"><div class="chip" style="background:var(--line-2)"></div><div class="lbl">--line-2<br>#9c7c4c</div></div><div class="sw"><div class="chip" style="background:var(--line-3)"></div><div class="lbl">--line-3<br>#8a6b3e</div></div><div class="sw"><div class="chip" style="background:var(--line-4)"></div><div class="lbl">--line-4<br>#7a5a30</div></div><div class="sw"><div class="chip" style="background:var(--line-5)"></div><div class="lbl">--line-5<br>#6f5230</div></div><div class="sw"><div class="chip" style="background:var(--night)"></div><div class="lbl">--night<br>#1c140b</div></div></div></body></html>
